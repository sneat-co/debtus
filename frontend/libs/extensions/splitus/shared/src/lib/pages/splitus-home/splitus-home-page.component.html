<ion-header>
  <ion-toolbar color="light" class="with-back-button with-end-buttons">
    <ion-buttons slot="start">
      <!-- This is the top page of a space, so "back" should leave the space and
           return to the app home (the spaces list), not to the space's own root
           (which redirects straight back here). -->
      <ion-back-button defaultHref="/" />
    </ion-buttons>
    <sneat-space-page-title
      [space]="space"
      generalTitle="Splits"
      icon="💸"
      [titlesBySpaceType]="{
        personal: 'Personal splits',
        family: 'Family splits',
      }"
    />
  </ion-toolbar>
</ion-header>

<ion-content class="cardy">
  <ion-card>
    <ion-card-content>
      <ion-button expand="block" (click)="goNewSplit()">
        <ion-icon name="add" slot="start" />
        New split
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
