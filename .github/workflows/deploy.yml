name: Deploy debtus-app

# Builds debtus-app and deploys it to the Firebase Hosting "debtusapp" site
# (project sneat-eur3-1, custom domain debtus.app).
#
# Auth is keyless via Workload Identity Federation (the org disables SA JSON
# keys): GitHub OIDC -> GCP service account github-debtus-deploy. No secrets.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build debtus-app
        working-directory: frontend
        run: pnpm exec nx build debtus-app

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/588648831063/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-debtus-deploy@sneat-eur3-1.iam.gserviceaccount.com

      - name: Deploy to Firebase Hosting (live)
        run: npx --yes firebase-tools@15 deploy --only hosting --project sneat-eur3-1 --non-interactive
